<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>跳跃的坤坤</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f3a 0%, #0a4c5c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Press Start 2P', monospace, system-ui;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        canvas {
            display: block;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 0 8px #f9e0a0, 0 0 0 12px #d4a373;
            border-radius: 16px;
            background-color: #7ec8e0;
            cursor: pointer;
        }

        .info-panel {
            margin-top: 20px;
            background: #2d2f36cc;
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 10px 25px;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 1px solid #ffd966;
            box-shadow: 0 5px 12px black;
        }

        .score-box, .best-box {
            background: #000000aa;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.7rem;
            font-family: monospace;
            color: #ffecb3;
            letter-spacing: 2px;
        }

        .score-box span, .best-box span {
            font-size: 1rem;
            margin-right: 8px;
            color: #ffeaa7;
        }

        .bird-status {
            background: #1e2a2ecc;
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 0.85rem;
            color: #f0f0f0;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .bird-status span:first-child {
            color: #ffd966;
        }

        .restart-btn {
            background: #e76f51;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.2s;
            box-shadow: 0 2px 6px black;
        }

        .restart-btn:hover {
            background: #f4a261;
            transform: scale(0.96);
        }

        .instruction {
            margin-top: 15px;
            background: #00000088;
            border-radius: 28px;
            padding: 6px 18px;
            color: #fef9e6;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 550px) {
            .info-panel {
                gap: 15px;
                padding: 8px 18px;
            }
            .score-box, .best-box {
                font-size: 1.2rem;
                padding: 3px 12px;
            }
            .bird-status {
                font-size: 0.7rem;
                padding: 3px 12px;
            }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="480" height="640"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>🐤 得分</span> <span id="currentScore">0</span></div>
            <div class="best-box"><span>🏆 最佳</span> <span id="bestScore">0</span></div>
            <div class="bird-status">
                <span>🐦 小鸟:</span>
                <span id="birdLoadStatus">加载 bird.png ...</span>
            </div>
            <button class="restart-btn" id="restartButton">🔄 重来</button>
        </div>
        <div class="instruction">
            💡 缓降(慢5倍) + 缓飞(慢3倍) | 点击画面 / 空格 / 上箭头 => 跳跃 | 穿管得分
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- 画布元素 -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ========== 游戏常量参数 (双重缓动调整) ==========
        // 1. 下坠速度慢5倍: 原0.2 → 0.04
        const GRAVITY = 0.04;          
        // 跳跃力度微调适配缓降 (让跳跃手感舒适，不飘)
        const JUMP_POWER = -2.2;       
        
        // 2. 飞行速度(管道移动速度)慢3倍: 原 PIPE_SPEED 约 2.2 → 2.2 / 3 ≈ 0.7333
        // 为了让游戏依然有挑战但更舒缓，精确设置为 0.73
        const PIPE_SPEED = 0.73;        // 原2.2，现在慢约3倍 (2.2/3≈0.733)
        
        // 管道其他参数保持合理间距，因为速度变慢，间距不变会让游戏更轻松但依然有趣
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 150;       
        const PIPE_SPACING = 280;       // 间距保持不变，因为管道移动慢，通过每个管道时间变长但得分节奏依然舒适
        
        // 小鸟碰撞箱 (视觉图片缩放)
        const BIRD_WIDTH = 36;
        const BIRD_HEIGHT = 36;
        
        // 世界边界
        const GROUND_Y_OFFSET = 70;   
        const CEILING_DEATH = 0;      
        
        // 游戏状态
        let gameRunning = true;
        let score = 0;
        let bestScore = 0;
        
        // 小鸟物理
        let birdY = canvas.height/2;
        let birdVelocity = 0;
        
        // 管道数组
        let pipes = [];
        
        // 帧动画ID
        let animationId = null;
        
        // ---------- 小鸟图片核心 (自动加载bird.png) ----------
        let birdImage = new Image();
        let imageLoadedSuccess = false;
        let imageLoadingFailed = false;
        const birdStatusSpan = document.getElementById('birdLoadStatus');
        
        function loadBirdImage() {
            imageLoadedSuccess = false;
            imageLoadingFailed = false;
            birdStatusSpan.innerText = "加载 bird.png ...";
            const img = new Image();
            img.onload = function() {
                birdImage = img;
                imageLoadedSuccess = true;
                imageLoadingFailed = false;
                birdStatusSpan.innerText = "✓ bird.png 已加载";
                birdStatusSpan.style.color = "#a3ffa3";
                setTimeout(() => {
                    if(birdStatusSpan.style.color) birdStatusSpan.style.color = "#f0f0f0";
                }, 1500);
            };
            img.onerror = function(err) {
                console.warn("未找到 bird.png, 使用默认小鸟", err);
                imageLoadedSuccess = false;
                imageLoadingFailed = true;
                birdStatusSpan.innerText = "⚠️ 未找到bird.png, 使用默认小鸟";
                birdStatusSpan.style.color = "#ffaa88";
                birdImage = new Image();
            };
            img.src = "bird.png";
        }
        
        // ----- 本地存储最佳分数 -----
        function loadBestScore(){
            const saved = localStorage.getItem('flappyBirdBest');
            if(saved && !isNaN(parseInt(saved))){
                bestScore = parseInt(saved);
                document.getElementById('bestScore').innerText = bestScore;
            } else {
                bestScore = 0;
                document.getElementById('bestScore').innerText = "0";
            }
        }
        
        function updateBestScoreUI(){
            if(score > bestScore){
                bestScore = score;
                localStorage.setItem('flappyBirdBest', bestScore);
                document.getElementById('bestScore').innerText = bestScore;
            }
        }
        
        function updateScoreUI(){
            document.getElementById('currentScore').innerText = score;
        }
        
        // ----- 重置游戏 -----
        function resetGame(){
            gameRunning = true;
            score = 0;
            updateScoreUI();
            birdY = canvas.height/2;
            birdVelocity = 0;
            pipes = [];
            generateInitialPipes();
            document.getElementById('bestScore').innerText = bestScore;
        }
        
        // 生成初始管道 (由于速度变慢，初始分布仍然合理)
        function generateInitialPipes(){
            let startX = canvas.width + 100;
            for(let i = 0; i < 4; i++){
                let gapY = getRandomGapY();
                pipes.push({
                    x: startX + i * PIPE_SPACING,
                    gapY: gapY,
                    counted: false
                });
            }
        }
        
        function getRandomGapY(){
            const minGap = 70;
            const maxGap = canvas.height - GROUND_Y_OFFSET - PIPE_GAP - 20;
            let gap = Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
            return Math.min(Math.max(gap, 55), canvas.height - GROUND_Y_OFFSET - PIPE_GAP - 15);
        }
        
        // ----- 更新逻辑 (使用慢速管道 PIPE_SPEED)-----
        function updateGame(){
            if(!gameRunning) return;
            
            // 重力更新 (下坠慢5倍)
            birdVelocity += GRAVITY;
            birdY += birdVelocity;
            
            // 边界死亡检测
            if(birdY + BIRD_HEIGHT/2 >= canvas.height - GROUND_Y_OFFSET){
                gameRunning = false;
                return;
            }
            if(birdY - BIRD_HEIGHT/2 <= CEILING_DEATH){
                gameRunning = false;
                return;
            }
            
            // 管道移动 (速度已慢3倍)
            for(let i = 0; i < pipes.length; i++){
                const p = pipes[i];
                p.x -= PIPE_SPEED;
                
                // 超出左侧屏幕移除并生成新管道
                if(p.x + PIPE_WIDTH < 0){
                    pipes.splice(i,1);
                    i--;
                    if(pipes.length > 0){
                        let lastPipe = pipes[pipes.length-1];
                        let newX = lastPipe.x + PIPE_SPACING;
                        let newGapY = getRandomGapY();
                        pipes.push({
                            x: newX,
                            gapY: newGapY,
                            counted: false
                        });
                    } else {
                        let newX = canvas.width + 50;
                        pipes.push({
                            x: newX,
                            gapY: getRandomGapY(),
                            counted: false
                        });
                    }
                    continue;
                }
                
                // 碰撞检测
                const birdLeft = canvas.width/2 - BIRD_WIDTH/2;
                const birdRight = canvas.width/2 + BIRD_WIDTH/2;
                const birdTop = birdY - BIRD_HEIGHT/2;
                const birdBottom = birdY + BIRD_HEIGHT/2;
                const topPipeBottom = p.gapY;
                const bottomPipeTop = p.gapY + PIPE_GAP;
                
                if(birdRight > p.x && birdLeft < p.x + PIPE_WIDTH){
                    if(birdTop < topPipeBottom){
                        gameRunning = false;
                        return;
                    }
                    if(birdBottom > bottomPipeTop){
                        gameRunning = false;
                        return;
                    }
                }
                
                // 得分判定
                if(!p.counted && (canvas.width/2 - BIRD_WIDTH/2) > p.x + PIPE_WIDTH){
                    p.counted = true;
                    score++;
                    updateScoreUI();
                    updateBestScoreUI();
                }
            }
            
            // 维持管道数量
            if(pipes.length < 2){
                let lastX = pipes.length ? pipes[pipes.length-1].x : canvas.width;
                pipes.push({
                    x: lastX + PIPE_SPACING,
                    gapY: getRandomGapY(),
                    counted: false
                });
            }
        }
        
        // ---------- 渲染模块 ----------
        function drawBackground(){
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0,"#a2def7");
            grad.addColorStop(0.6,"#6bb5d9");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#ffffffc0";
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(70, 80, 45, 35, 0, 0, Math.PI*2);
            ctx.ellipse(120, 70, 40, 32, 0, 0, Math.PI*2);
            ctx.ellipse(160, 90, 38, 30, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(390, 140, 52, 38, 0, 0, Math.PI*2);
            ctx.ellipse(440, 125, 44, 34, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#5c9e5e";
            ctx.fillRect(0, canvas.height - GROUND_Y_OFFSET, canvas.width, GROUND_Y_OFFSET);
            ctx.fillStyle = "#7fb07f";
            for(let i=0;i<14;i++){
                ctx.fillRect(i*40, canvas.height-GROUND_Y_OFFSET-7, 28, 12);
            }
            ctx.fillStyle = "#dba54e";
            ctx.fillRect(0, canvas.height - GROUND_Y_OFFSET+4, canvas.width, 6);
        }
        
        function drawPipes(){
            for(let p of pipes){
                const gradTop = ctx.createLinearGradient(p.x, 0, p.x+PIPE_WIDTH, 0);
                gradTop.addColorStop(0, "#2f6b2f");
                gradTop.addColorStop(1, "#4cae4c");
                ctx.fillStyle = gradTop;
                ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY);
                ctx.fillStyle = "#2b5e2b";
                ctx.fillRect(p.x+6, p.gapY-30, PIPE_WIDTH-12, 30);
                ctx.fillStyle = "#8ed15e";
                ctx.fillRect(p.x+3, p.gapY-20, PIPE_WIDTH-6, 12);
                
                const bottomY = p.gapY + PIPE_GAP;
                const bottomHeight = canvas.height - GROUND_Y_OFFSET - bottomY;
                const gradBottom = ctx.createLinearGradient(p.x, bottomY, p.x+PIPE_WIDTH, bottomY+40);
                gradBottom.addColorStop(0, "#2f6b2f");
                gradBottom.addColorStop(1, "#4cae4c");
                ctx.fillStyle = gradBottom;
                ctx.fillRect(p.x, bottomY, PIPE_WIDTH, bottomHeight);
                ctx.fillStyle = "#2b5e2b";
                ctx.fillRect(p.x+6, bottomY, PIPE_WIDTH-12, 30);
                ctx.fillStyle = "#8ed15e";
                ctx.fillRect(p.x+3, bottomY+18, PIPE_WIDTH-6, 12);
            }
        }
        
        function drawBird(){
            const birdX = canvas.width/2 - BIRD_WIDTH/2;
            const birdYPos = birdY - BIRD_HEIGHT/2;
            const angle = Math.min(Math.max(birdVelocity * 0.25, -0.7), 0.8);
            ctx.save();
            ctx.translate(canvas.width/2, birdY);
            ctx.rotate(angle);
            ctx.translate(-(canvas.width/2), -birdY);
            
            if(imageLoadedSuccess && birdImage.complete && birdImage.naturalWidth > 0){
                try {
                    ctx.drawImage(birdImage, birdX, birdYPos, BIRD_WIDTH, BIRD_HEIGHT);
                } catch(e) {
                    drawFallbackBird(birdX, birdYPos);
                }
            } else {
                drawFallbackBird(birdX, birdYPos);
            }
            ctx.restore();
        }
        
        function drawFallbackBird(x, y){
            ctx.fillStyle = "#ffa559";
            ctx.shadowBlur = 3;
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.beginPath();
            ctx.ellipse(x+BIRD_WIDTH/2, y+BIRD_HEIGHT/2, BIRD_WIDTH/2, BIRD_HEIGHT/2.2, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#e0692e";
            ctx.beginPath();
            ctx.ellipse(x+BIRD_WIDTH*0.7, y+BIRD_HEIGHT*0.4, 5, 6, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x+BIRD_WIDTH*0.6, y+BIRD_HEIGHT*0.33, 2.6, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#1e2a2e";
            ctx.beginPath();
            ctx.arc(x+BIRD_WIDTH*0.57, y+BIRD_HEIGHT*0.31, 1.4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#f08c2e";
            ctx.beginPath();
            ctx.moveTo(x+BIRD_WIDTH*0.86, y+BIRD_HEIGHT*0.47);
            ctx.lineTo(x+BIRD_WIDTH*0.99, y+BIRD_HEIGHT*0.52);
            ctx.lineTo(x+BIRD_WIDTH*0.86, y+BIRD_HEIGHT*0.6);
            ctx.fill();
            ctx.fillStyle = "#e05a1a";
            ctx.beginPath();
            ctx.moveTo(x+BIRD_WIDTH*0.3, y+BIRD_HEIGHT*0.2);
            ctx.lineTo(x+BIRD_WIDTH*0.45, y+BIRD_HEIGHT*0.07);
            ctx.lineTo(x+BIRD_WIDTH*0.55, y+BIRD_HEIGHT*0.18);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function drawGameOverlay(){
            if(!gameRunning){
                ctx.fillStyle = "rgba(0,0,0,0.78)";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.font = "bold 36px 'Courier New', monospace";
                ctx.fillStyle = "#ffda88";
                ctx.fillText("GAME OVER", canvas.width/2-125, canvas.height/2-45);
                ctx.font = "20px monospace";
                ctx.fillStyle = "#fff5e0";
                ctx.fillText("点击「重来」继续挑战", canvas.width/2-130, canvas.height/2+30);
                ctx.font = "15px monospace";
                ctx.fillStyle = "#ffe0a3";
                ctx.fillText("缓降+缓飞双模式 | 空格/点击跳跃", canvas.width/2-170, canvas.height/2+85);
            }
        }
        
        function drawStatusMessage(){
            if(!imageLoadedSuccess && !imageLoadingFailed){
                ctx.font = "12px monospace";
                ctx.fillStyle = "#f9f3c1";
                ctx.fillText("🕊️ 正在加载 bird.png ...", 14, 45);
            } else if(imageLoadingFailed){
                ctx.font = "12px monospace";
                ctx.fillStyle = "#ffc89c";
                ctx.fillText("💡 提示: 请将图片命名为 bird.png 放在本文件夹", 14, 45);
            } else if(imageLoadedSuccess){
                ctx.font = "11px monospace";
                ctx.fillStyle = "#daffd4";
                ctx.fillText("🐦 自定义图片 | 缓降+缓飞 双缓模式", 14, 45);
            }
        }
        
        function jump(){
            if(!gameRunning) return;
            birdVelocity = JUMP_POWER;
        }
        
        function restartGame(){
            resetGame();
            gameRunning = true;
        }
        
        function bindEvents(){
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                jump();
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                jump();
            }, {passive: false});
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space' || e.code === 'ArrowUp'){
                    e.preventDefault();
                    jump();
                }
                if(e.code === 'KeyR'){
                    e.preventDefault();
                    restartGame();
                }
            });
            document.getElementById('restartButton').addEventListener('click', () => {
                restartGame();
            });
        }
        
        function gameLoop(){
            updateGame();
            drawBackground();
            drawPipes();
            drawBird();
            drawStatusMessage();
            drawGameOverlay();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function init(){
            loadBestScore();
            resetGame();
            bindEvents();
            loadBirdImage();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        init();
    })();
</script>
</body>
</html>
